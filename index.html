<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buildless Web</title>
    <style>
        body {
            background: #121214;
            color: #e1e1e6;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #202024;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }
        button {
            background: #8257e5;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover { background: #9466ff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to the Buildless Web</h1>
        <p id="status">Open DevTools to see how beautiful this source code is.</p>
        <button id="action-btn">Click Me</button>
    </div>

    <!-- NATIVE MODULE ENTRY POINT -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
